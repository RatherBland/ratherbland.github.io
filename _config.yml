title: Misha's Blog
author: Misha
description: >-
  Personal blog of Misha — notes on security engineering, infrastructure,
  and the occasional deep dive.
url: "https://blog.misha.casa"
baseurl: ""

# No `theme:` — we ship our own layouts/includes/assets.

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Default front matter
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author: Misha

# Build settings
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  toc_levels: 2..3
  auto_ids: true

permalink: /:year/:month/:day/:title/

# SEO / social
twitter:
  username: ""
social:
  name: Misha
  links: []

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .sass-cache
  - .jekyll-cache
  - node_modules
  - README.md
