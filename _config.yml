title: Misha's Blog
author: Misha
description: >-
  Personal blog of Misha — notes on security engineering, infrastructure,
  and the occasional deep dive.
url: "https://blog.misha.casa"
baseurl: ""

# No `theme:` — we ship our own layouts/includes/assets.

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-redirect-from

# Default front matter
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author: Misha

# Build settings
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  toc_levels: 2..3
  auto_ids: true

permalink: /:year/:month/:day/:title/
future: true  # don't skip posts whose time is slightly ahead of build time

# SEO / social
twitter:
  username: ""
social:
  name: Misha
  links: []

# Giscus comments (https://giscus.app).
# Fill repo_id and category_id from https://giscus.app/ once Discussions are
# enabled on the repo. While these are "FILL_ME_IN" the widget stays hidden.
giscus:
  repo: "RatherBland/ratherbland.github.io"
  repo_id: "FILL_ME_IN"
  category: "General"
  category_id: "FILL_ME_IN"
  mapping: "pathname"
  theme: "preferred_color_scheme"
  reactions_enabled: "1"
  input_position: "top"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .sass-cache
  - .jekyll-cache
  - node_modules
  - README.md
