---
layout: default
title: Search
permalink: /search/
---
<section class="search">
  <h1 class="page-title">Full-text search</h1>
  <p class="search__hint">
    Indexes every post. Runs entirely in your browser via
    <a href="https://pagefind.app/">Pagefind</a> — no server, no tracking.
  </p>
  <div id="search"></div>
</section>

<link rel="stylesheet" href="{{ '/pagefind/pagefind-ui.css' | relative_url }}">
<script src="{{ '/pagefind/pagefind-ui.js' | relative_url }}"></script>
<script>
  window.addEventListener("DOMContentLoaded", function () {
    new PagefindUI({
      element: "#search",
      showSubResults: true,
      showImages: false,
      resetStyles: false,
    });
  });
</script>
