<!doctype html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">

  {%- assign page_title = page.title | default: site.title -%}
  <title>{% if page.title and page.url != "/" %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>

  {%- seo title=false -%}
  {%- feed_meta -%}

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap">

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

  {%- if jekyll.environment == "production" -%}
  <script defer src="https://cloud.umami.is/script.js" data-website-id="138f0720-e065-4245-a750-2864ea2cc837"></script>
  {%- endif -%}
</head>
