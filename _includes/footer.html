<footer class="site-footer">
  <div class="wrap">
    {%- if site.social.links and site.social.links.size > 0 -%}
    <ul class="site-footer__social" aria-label="Social links">
      {%- for link in site.social.links -%}
      <li>
        <a href="{{ link.url }}" rel="me noopener" target="_blank">{{ link.label }}</a>
      </li>
      {%- endfor -%}
    </ul>
    {%- endif -%}
    <p class="site-footer__meta">
      © {{ 'now' | date: '%Y' }} {{ site.author }}.
      Built with <a href="https://jekyllrb.com/">Jekyll</a>,
      hosted on <a href="https://pages.github.com/">GitHub Pages</a>,
      source on <a href="https://github.com/ratherbland/ratherbland.github.io">GitHub</a>.
    </p>
  </div>
</footer>
